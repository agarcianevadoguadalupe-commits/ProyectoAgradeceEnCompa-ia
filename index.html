<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agradece en Compañía</title>
    <meta name="author" content="Abraham García Nevado">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <h1>AGRADECE EN COMPAÑÍA</h1>

    <h2>Iniciar Sesión</h2>

    <form action="inicio.html" method="post">

        <label for="usuario">Nombre de usuario:</label><br>
        <input type="text" id="usuario" name="usuario" placeholder="Tu nombre de usuario" required><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password" placeholder="Tu contraseña min. 8 caracteres" required><br><br>

        <input type="checkbox" id="recordarme" name="recordarme">
        <label for="recordarme">Recuérdame</label><br><br>

        <input type="submit" value="Entrar">

    </form>

</body>
</html>
